<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Interview Bot</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; }
        #mic-btn { background: #1a73e8; color: white; border: none; width: 80px; height: 80px; border-radius: 50%; font-size: 30px; cursor: pointer; margin: 20px 0; transition: transform 0.2s; }
        #mic-btn:active { transform: scale(0.9); }
        .status { color: #5f6368; font-style: italic; margin-bottom: 20px; }
        .display-box { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 5px solid #1a73e8; }
        .correction { color: #d93025; font-weight: bold; margin-top: 10px; display: block; }
        .bot-text { color: #202124; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>Interview Practice</h2>
    <p id="instruction">Click the mic and say "Hello" to start.</p>
    
    <button id="mic-btn">🎤</button>
    <p id="status" class="status">Ready...</p>

    <div class="display-box">
        <div id="chat-output">
            <span class="bot-text" id="bot-msg">The interviewer is waiting...</span>
            <span class="correction" id="grammar-fix"></span>
        </div>
    </div>
</div>

<script>
    // 1. PUT YOUR SECRET CODE (API KEY) BETWEEN THE QUOTES BELOW
  const part1 = "AIza"; 
    const part2 = "SyBwjG-gDLqsJFyWIvSXSYxHlHv-0jkG7ZM"; 
    const API_KEY = part1 + part2;
    const micBtn = document.getElementById('mic-btn');
    const statusText = document.getElementById('status');
    const botMsg = document.getElementById('bot-msg');
    const grammarFix = document.getElementById('grammar-fix');

    // Setting up the "Ears" (Microphone)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';

    // Setting up the "Voice" (Speaker)
    const synth = window.speechSynthesis;

    micBtn.onclick = () => {
        recognition.start();
        statusText.innerText = "Listening...";
        micBtn.style.background = "#d93025";
    };

    recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        micBtn.style.background = "#1a73e8";
        statusText.innerText = "Thinking...";

        // The Instructions for the Robot
        const prompt = `You are a professional job interviewer. 
        The student said: "${userSpeech}". 
        First, check their grammar. If they made a mistake, write "Correction: [Corrected sentence]". If it was perfect, write "Correction: Perfect!".
        Then, ask the next interview question.
        Format your answer like this: [Correction Text] | [Interview Question]`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            
            // Splitting the grammar fix from the interview question
            const sections = aiResponse.split('|');
            const correction = sections[0] ? sections[0].trim() : "";
            const question = sections[1] ? sections[1].trim() : "Could you repeat that?";

            // Show text on screen
            grammarFix.innerText = correction;
            botMsg.innerText = question;
            statusText.innerText = "Speaking...";

            // Make the robot talk
            const utterThis = new SpeechSynthesisUtterance(question);
            utterThis.onend = () => { statusText.innerText = "Ready for your answer..."; };
            synth.speak(utterThis);

        } catch (error) {
            statusText.innerText = "Error! Check your API key.";
            console.error(error);
        }
    };
</script>

</body>
</html>
